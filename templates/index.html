<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GridWorld 網格建造器</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <!-- Google Fonts for premium look -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1>GridWorld 網格建造器</h1>
        <p class="description">設定維度 n (5-9)，然後依序指定起點、終點與障礙物。</p>
        
        <div class="controls">
            <div class="input-group">
                <label for="grid-size">維度 n (5-9):</label>
                <input type="number" id="grid-size" min="5" max="9" value="5">
            </div>
            <button id="generate-btn" class="primary-btn">產生網格</button>
            <button id="policy-btn" class="accent-btn" disabled>生成隨機策略</button>
            <button id="evaluate-btn" class="accent-btn" disabled>策略評估</button>
            <button id="reset-btn" class="secondary-btn">重置</button>
        </div>

        <div id="status-message" class="status">請輸入 n 並點擊「產生網格」</div>

        <!-- Main Selection Grid -->
        <div id="selection-view" class="grid-wrapper">
            <div id="grid-container" class="grid-container"></div>
        </div>

        <!-- Dual Result Grids (Hidden by default) -->
        <div id="result-view" class="result-view" style="display: none;">
            <div class="result-grids">
                <div class="grid-item">
                    <h3>隨機策略 (Policy)</h3>
                    <div id="policy-grid" class="grid-container"></div>
                </div>
                <div class="grid-item">
                    <h3>價值函數 (V(s))</h3>
                    <div id="value-grid" class="grid-container"></div>
                </div>
            </div>
            <div class="result-controls">
                <button id="regen-policy-btn" class="accent-btn">重新生成策略</button>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
